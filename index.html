<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>醫院掛科篩選器 | 症狀梳理助手</title>
<style>
  :root {
    --bg: #f5f3f0;
    --card: #ffffff;
    --text: #2d2d2d;
    --muted: #888;
    --accent: #6b9bd1;
    --accent2: #7ec4a0;
    --danger: #e85757;
    --warn: #f0ad4e;
    --success: #5cb85c;
    --info: #5bc0de;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding-bottom: 40px;
  }
  header {
    background: linear-gradient(135deg, var(--accent), #4a7ab8);
    color: white;
    padding: 40px 20px;
    text-align: center;
  }
  header h1 { font-size: 1.8rem; margin-bottom: 8px; }
  header p { opacity: 0.9; font-size: 0.95rem; }
  .nav { text-align: center; margin: 16px; }
  .nav a {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.9rem;
    padding: 6px 14px;
    border: 1px solid var(--accent);
    border-radius: 20px;
    display: inline-block;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 20px; }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .card h2 {
    font-size: 1.1rem;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* 身體部位選擇 */
  .body-parts {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .body-part {
    padding: 16px 8px;
    border: 2px solid #e8e8e8;
    border-radius: 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: white;
    font-size: 0.9rem;
  }
  .body-part .emoji { font-size: 1.8rem; display: block; margin-bottom: 6px; }
  .body-part:hover { border-color: var(--accent); transform: translateY(-2px); }
  .body-part.active {
    border-color: var(--accent);
    background: #eef4fb;
    box-shadow: 0 2px 8px rgba(107,155,209,0.15);
  }

  /* 症狀選擇 */
  .symptom-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .symptom-tag {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1.5px solid #e0e0e0;
    background: #fafafa;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s;
    user-select: none;
  }
  .symptom-tag:hover { border-color: var(--accent); }
  .symptom-tag.selected {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .symptom-tag.urgent {
    border-color: #ffcccb;
  }
  .symptom-tag.urgent.selected {
    background: var(--danger);
    border-color: var(--danger);
  }

  /* 結果卡片 */
  .result-card {
    border-radius: 16px;
    padding: 24px;
    margin-top: 20px;
  }
  .result-card.emergency {
    background: linear-gradient(135deg, #fff0f0, #fff);
    border: 2px solid var(--danger);
  }
  .result-card.urgent {
    background: linear-gradient(135deg, #fff8e6, #fff);
    border: 2px solid var(--warn);
  }
  .result-card.normal {
    background: linear-gradient(135deg, #e8f5e9, #fff);
    border: 2px solid var(--success);
  }
  .result-title {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .result-card.emergency .result-title { color: var(--danger); }
  .result-card.urgent .result-title { color: #b38600; }
  .result-card.normal .result-title { color: var(--success); }

  .dept-recommendation {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
  }
  .dept-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .dept-rank {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 0.9rem;
    flex-shrink: 0;
  }
  .dept-rank.rank-1 { background: var(--accent); color: white; }
  .dept-rank.rank-2 { background: #b8d4f0; color: var(--accent); }
  .dept-rank.rank-3 { background: #e0e0e0; color: #666; }
  .dept-name { font-weight: 700; font-size: 1.05rem; }
  .dept-reason { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

  .selected-symptoms {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 16px 0;
    padding: 12px;
    background: #f8f8f8;
    border-radius: 10px;
  }
  .selected-symptom {
    padding: 4px 12px;
    background: var(--accent);
    color: white;
    border-radius: 16px;
    font-size: 0.85rem;
  }

  .tip-box {
    padding: 16px;
    border-radius: 12px;
    font-size: 0.9rem;
    margin-top: 12px;
  }
  .tip-box.danger { background: #fff0f0; color: #a03030; }
  .tip-box.warn { background: #fff8e6; color: #8a6d00; }
  .tip-box.info { background: #e3f2fd; color: #1565c0; }

  .btn {
    display: inline-block;
    padding: 12px 24px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    font-weight: 600;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #4a7ab8);
    color: white;
    width: 100%;
  }
  .btn-secondary {
    background: #f0f0f0;
    color: #555;
    width: 100%;
    margin-top: 10px;
  }

  .divider {
    height: 1px;
    background: #eee;
    margin: 20px 0;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  .disclaimer {
    text-align: center;
    font-size: 0.8rem;
    color: #aaa;
    margin-top: 30px;
    padding: 0 20px;
  }

  @media (max-width: 480px) {
    header h1 { font-size: 1.4rem; }
    .card { padding: 18px; }
    .body-parts { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>

<header>

<div class="nav">
</div>

  <div class="card">

    <div class="symptom-list" id="symptomList"></div>
  </div>

  <!-- 步驟 3：分析結果 -->
  <div id="resultArea"></div>

  <!-- 操作按鈕 -->
  <div class="card" id="actionCard" style="display:none;">

    <button class="btn btn-secondary" onclick="resetAll()">🔄 重新選擇</button>

  <!-- 免責聲明 -->

  </p>

</div>

      { name: '疲倦/虛弱', urgent: false, depts: ['家醫科'], note: '長期疲倦需檢查血球和內分泌' },
      { name: '體重減輕', urgent: false, depts: ['家醫科', '內分泌科'], note: '半年減5%以上需檢查' },
      { name: '水腫', urgent: false, depts: ['腎臟科', '心臟內科'], note: '雙腳水腫→腎臟科；合併氣喘→心臟內科' },
      { name: '盜汗', urgent: false, depts: ['家醫科', '血液腫瘤科'], note: '夜間盜汗→排除感染或腫瘤' },
      { name: '淋巴結腫大', urgent: false, depts: ['血液腫瘤科'], note: '超過2週不消需檢查' },
      { name: '過敏反應', urgent: true, depts: ['急診', '過敏免疫風濕科'], note: '呼吸困難或嘴唇腫→急診' },
    ]
  },
};

let selectedPart = null;
let selectedSymptoms = [];

// 初始化身體部位
function initBodyParts() {
  const container = document.getElementById('bodyParts');
  Object.entries(SYMPTOM_DB).forEach(([key, data]) => {
    const div = document.createElement('div');
    div.className = 'body-part';
    div.dataset.part = key;
    div.innerHTML = `<span class="emoji">${data.emoji}</span>${data.name}`;
    div.onclick = () => selectPart(key);
    container.appendChild(div);
  });
}

function selectPart(key) {
  selectedPart = key;
  selectedSymptoms = [];

  // 更新部位 UI
  document.querySelectorAll('.body-part').forEach(el => {
    el.classList.toggle('active', el.dataset.part === key);
  });

  // 顯示症狀
  const symptomCard = document.getElementById('symptomCard');
  const symptomList = document.getElementById('symptomList');
  symptomCard.style.display = 'block';

  const symptoms = SYMPTOM_DB[key].symptoms;
  symptomList.innerHTML = symptoms.map((s, i) => `
    <span class="symptom-tag ${s.urgent ? 'urgent' : ''}" data-idx="${i}" onclick="toggleSymptom(${i})">
      ${s.urgent ? '🚨 ' : ''}${s.name}
    </span>
  `).join('');

  // 清除結果
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('actionCard').style.display = 'block';
}

function toggleSymptom(idx) {
  const tags = document.querySelectorAll('.symptom-tag');
  const tag = tags[idx];
  tag.classList.toggle('selected');

  const symptom = SYMPTOM_DB[selectedPart].symptoms[idx];
  const existing = selectedSymptoms.find(s => s.name === symptom.name);
  if (existing) {
    selectedSymptoms = selectedSymptoms.filter(s => s.name !== symptom.name);
  } else {
    selectedSymptoms.push(symptom);
  }
}

function analyze() {
  if (selectedSymptoms.length === 0) {
    alert('請先選擇至少一個症狀');
    return;
  }

  // 統計科別推薦
  const deptScores = {};
  let hasUrgent = false;

  selectedSymptoms.forEach(s => {
    if (s.urgent) hasUrgent = true;
    s.depts.forEach((dept, i) => {
      if (!deptScores[dept]) deptScores[dept] = { score: 0, reasons: [] };
      // 第一順位分數較高
      deptScores[dept].score += (3 - i) * 10;
      deptScores[dept].reasons.push(`${s.name}：${s.note}`);
    });
  });

  // 排序
  const sortedDepts = Object.entries(deptScores)
    .sort((a, b) => b[1].score - a[1].score)
    .slice(0, 3);

  // 決定緊急程度
  let level = 'normal';
  let title = '🏥 建議就診科別';
  let emoji = '✅';

  const urgentSymptoms = selectedSymptoms.filter(s => s.urgent);
  if (urgentSymptoms.length >= 2) {
    level = 'emergency';
    title = '🚨 強烈建議立即就醫';
    emoji = '🚨';
  } else if (urgentSymptoms.length === 1) {
    level = 'urgent';
    title = '⚠️ 建議盡快就醫';
    emoji = '⚠️';
  }

  // 生成結果 HTML
  const resultArea = document.getElementById('resultArea');

  const selectedHtml = selectedSymptoms.map(s =>
    `<span class="selected-symptom">${s.urgent ? '🚨' : ''} ${s.name}</span>`
  ).join('');

  const deptHtml = sortedDepts.map(([dept, data], i) => `
    <div class="dept-item">
      <div class="dept-rank rank-${i + 1}">${i + 1}</div>
      <div>
        <div class="dept-name">${dept}</div>
        <div class="dept-reason">${data.reasons[0]}</div>
      </div>
    </div>
  `).join('');

  // 建議文字
  let tipHtml = '';
  if (level === 'emergency') {
    tipHtml = `
      <div class="tip-box danger">
        <strong>🚨 緊急提醒：</strong>你選擇的症狀包含緊急情況，建議立即前往<strong>急診</strong>就醫，不要拖延。
      </div>`;
  } else if (level === 'urgent') {
    const urgentName = urgentSymptoms[0].name;
    tipHtml = `
      <div class="tip-box warn">
        <strong>⚠️ 注意：</strong>「${urgentName}」建議盡快就醫。如果症狀加劇，請立即前往急診。
      </div>`;
  } else {
    tipHtml = `
      <div class="tip-box info">
        <strong>💡 就醫提醒：</strong>建議先掛<strong>${sortedDepts[0][0]}</strong>，醫師會視情況協助轉診其他科別。
      </div>`;
  }

  resultArea.innerHTML = `
    <div class="card result-card ${level}">
      <div class="result-title">${emoji} ${title}</div>
      <p style="color:var(--muted);font-size:0.85rem;margin-bottom:12px;">根據你選擇的症狀：</p>
      <div class="selected-symptoms">${selectedHtml}</div>
      <div class="dept-recommendation">${deptHtml}</div>
      ${tipHtml}
      <div class="divider"></div>
      <p style="font-size:0.8rem;color:#aaa;">
        💬 建議就診時向醫師詳細描述：症狀開始時間、持續多久、什麼情況下加重或緩解、是否有服用藥物。
      </p>
    </div>
  `;

  // 隱藏按鈕區
  document.getElementById('actionCard').style.display = 'none';
}

function resetAll() {
  selectedPart = null;
  selectedSymptoms = [];
  document.querySelectorAll('.body-part').forEach(el => el.classList.remove('active'));
  document.getElementById('symptomCard').style.display = 'none';
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('actionCard').style.display = 'none';
}

// 初始化
initBodyParts();
</script>

</body>
</html>
