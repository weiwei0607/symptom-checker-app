<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>醫院掛科篩選器 | 症狀梳理助手</title>
<style>
  :root {
    --bg: #f5f3f0;
    --card: #ffffff;
    --text: #2d2d2d;
    --muted: #888;
    --accent: #6b9bd1;
    --accent2: #7ec4a0;
    --danger: #e85757;
    --warn: #f0ad4e;
    --success: #5cb85c;
    --info: #5bc0de;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding-bottom: 40px;
  }
  header {
    background: linear-gradient(135deg, var(--accent), #4a7ab8);
    color: white;
    padding: 40px 20px;
    text-align: center;
  }
  header h1 { font-size: 1.8rem; margin-bottom: 8px; }
  header p { opacity: 0.9; font-size: 0.95rem; }
  .nav { text-align: center; margin: 16px; }
  .nav a {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.9rem;
    padding: 6px 14px;
    border: 1px solid var(--accent);
    border-radius: 20px;
    display: inline-block;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 20px; }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .card h2 {
    font-size: 1.1rem;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* 身體部位選擇 */
  .body-parts {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .body-part {
    padding: 16px 8px;
    border: 2px solid #e8e8e8;
    border-radius: 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: white;
    font-size: 0.9rem;
  }
  .body-part .emoji { font-size: 1.8rem; display: block; margin-bottom: 6px; }
  .body-part:hover { border-color: var(--accent); transform: translateY(-2px); }
  .body-part.active {
    border-color: var(--accent);
    background: #eef4fb;
    box-shadow: 0 2px 8px rgba(107,155,209,0.15);
  }

  /* 症狀選擇 */
  .symptom-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .symptom-tag {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1.5px solid #e0e0e0;
    background: #fafafa;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s;
    user-select: none;
  }
  .symptom-tag:hover { border-color: var(--accent); }
  .symptom-tag.selected {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .symptom-tag.urgent {
    border-color: #ffcccb;
  }
  .symptom-tag.urgent.selected {
    background: var(--danger);
    border-color: var(--danger);
  }

  /* 結果卡片 */
  .result-card {
    border-radius: 16px;
    padding: 24px;
    margin-top: 20px;
  }
  .result-card.emergency {
    background: linear-gradient(135deg, #fff0f0, #fff);
    border: 2px solid var(--danger);
  }
  .result-card.urgent {
    background: linear-gradient(135deg, #fff8e6, #fff);
    border: 2px solid var(--warn);
  }
  .result-card.normal {
    background: linear-gradient(135deg, #e8f5e9, #fff);
    border: 2px solid var(--success);
  }
  .result-title {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .result-card.emergency .result-title { color: var(--danger); }
  .result-card.urgent .result-title { color: #b38600; }
  .result-card.normal .result-title { color: var(--success); }

  .dept-recommendation {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
  }
  .dept-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .dept-rank {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 0.9rem;
    flex-shrink: 0;
  }
  .dept-rank.rank-1 { background: var(--accent); color: white; }
  .dept-rank.rank-2 { background: #b8d4f0; color: var(--accent); }
  .dept-rank.rank-3 { background: #e0e0e0; color: #666; }
  .dept-name { font-weight: 700; font-size: 1.05rem; }
  .dept-reason { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

  .selected-symptoms {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 16px 0;
    padding: 12px;
    background: #f8f8f8;
    border-radius: 10px;
  }
  .selected-symptom {
    padding: 4px 12px;
    background: var(--accent);
    color: white;
    border-radius: 16px;
    font-size: 0.85rem;
  }

  .tip-box {
    padding: 16px;
    border-radius: 12px;
    font-size: 0.9rem;
    margin-top: 12px;
  }
  .tip-box.danger { background: #fff0f0; color: #a03030; }
  .tip-box.warn { background: #fff8e6; color: #8a6d00; }
  .tip-box.info { background: #e3f2fd; color: #1565c0; }

  .btn {
    display: inline-block;
    padding: 12px 24px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    font-weight: 600;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #4a7ab8);
    color: white;
    width: 100%;
  }
  .btn-secondary {
    background: #f0f0f0;
    color: #555;
    width: 100%;
    margin-top: 10px;
  }

  .divider {
    height: 1px;
    background: #eee;
    margin: 20px 0;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  .disclaimer {
    text-align: center;
    font-size: 0.8rem;
    color: #aaa;
    margin-top: 30px;
    padding: 0 20px;
  }

  @media (max-width: 480px) {
    header h1 { font-size: 1.4rem; }
    .card { padding: 18px; }
    .body-parts { grid-template-columns: repeat(3, 1fr); }
  }

  /* Header settings button */
  header { position: relative; }
  .header-settings {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 1.1rem;
    width: 38px; height: 38px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .header-settings:hover { background: rgba(255,255,255,0.35); }

  /* AI card styles */
  .ai-badge {
    font-size: 0.65rem;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    vertical-align: middle;
  }
  .ai-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    border-bottom: 2px solid #eee;
    padding-bottom: 0;
  }
  .ai-tab-btn {
    padding: 8px 16px;
    border: none;
    background: none;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .ai-tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .ai-textarea {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    padding: 14px;
    font-size: 0.95rem;
    font-family: inherit;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.15s;
    background: #fafafa;
  }
  .ai-textarea:focus { border-color: var(--accent); background: white; }
  .ai-result {
    background: linear-gradient(135deg, #f0f4ff, #fff);
    border: 1.5px solid #b8c8f0;
    border-radius: 14px;
    padding: 20px;
    margin-top: 16px;
  }
  .ai-result-title {
    font-weight: 700;
    font-size: 1rem;
    color: #3a5aad;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .spin {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .what-to-tell {
    background: #e8f4fd;
    border-left: 4px solid var(--accent);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.9rem;
    color: #1a4a8a;
    margin-top: 12px;
  }

  /* Settings modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-box {
    background: white;
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-box h3 { font-size: 1rem; margin-bottom: 8px; }
  .modal-box p { font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; }
  .modal-input {
    width: 100%;
    border: 1.5px solid #ddd;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 0.9rem;
    font-family: monospace;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
  .modal-cancel { background: #f0f0f0; color: #555; }
  .modal-save { background: linear-gradient(135deg, var(--accent), #4a7ab8); color: white; }
</style>
</head>
<body>

<header>
  <h1>🏥 醫院掛科篩選器</h1>
  <p>選擇你的症狀，幫你找到最適合的科別</p>
  <button class="header-settings" onclick="openSymptomSettings()" title="設定 Gemini API Key">⚙️</button>
</header>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal" style="display:none;" onclick="if(event.target===this)closeSymptomSettings()">
  <div class="modal-box">
    <h3>⚙️ Gemini API Key</h3>
    <p>AI 自然語言分析需要 Gemini API Key（只存在本機）</p>
    <input type="password" class="modal-input" id="geminiKeyInput" placeholder="輸入 Gemini API Key" />
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeSymptomSettings()">取消</button>
      <button class="modal-save" onclick="saveSymptomSettings()">儲存</button>
    </div>
  </div>
</div>

<div class="container">

  <!-- AI 自然語言分析 -->
  <div class="card">
    <h2>🤖 AI 症狀分析 <span class="ai-badge">AI</span></h2>
    <div class="ai-tabs">
      <button class="ai-tab-btn active" id="tabAI" onclick="switchAiTab('ai')">✍️ 文字描述</button>
      <button class="ai-tab-btn" id="tabManual" onclick="switchAiTab('manual')">📋 點選症狀</button>
    </div>
    <div id="aiPanel">
      <p style="color:var(--muted);font-size:0.9rem;margin-bottom:12px;">直接描述你哪裡不舒服，AI 幫你判斷該掛哪科</p>
      <textarea class="ai-textarea" id="aiInput" placeholder="例如：我最近胸口悶悶的，有時候心跳很快，爬樓梯會喘，已經兩週了。之前沒有這種情況..."></textarea>
      <div id="aiError" style="color:var(--danger);font-size:0.85rem;display:none;margin-top:8px;"></div>
      <button class="btn btn-primary" id="aiBtn" onclick="analyzeWithAI()" style="margin-top:12px;">✨ AI 智能分析</button>
      <div id="aiResult"></div>
      <div id="aiHistory" style="margin-top:16px;"></div>
    </div>
    <div id="manualPanel" style="display:none;">
      <p style="color:var(--muted);font-size:0.9rem;">從下方選擇身體部位和症狀，點擊「分析該看哪科」</p>
    </div>
  </div>

  <!-- 步驟 1：選擇身體部位（點選症狀模式） -->
  <div class="card" id="manualSection" style="display:none;">
    <h2>📍 哪裡不舒服？</h2>
    <div class="body-parts" id="bodyParts"></div>
  </div>

  <!-- 步驟 2：選擇症狀 -->
  <div class="card" id="symptomCard" style="display:none;">
    <h2>🔍 具體症狀</h2>
    <p style="color:var(--muted);font-size:0.9rem;margin-bottom:12px;">可多選，選得越準確建議越精準</p>
    <div class="symptom-list" id="symptomList"></div>
  </div>

  <!-- 步驟 3：分析結果 -->
  <div id="resultArea"></div>

  <!-- 操作按鈕 -->
  <div class="card" id="actionCard" style="display:none;">
    <p id="analyzeError" style="color:var(--danger);font-size:0.85rem;margin-bottom:8px;display:none;">請先選擇至少一個症狀</p>
    <button class="btn btn-primary" onclick="analyze()">🔎 分析該看哪科</button>
    <button class="btn btn-secondary" onclick="resetAll()">🔄 重新選擇</button>
  </div>

  <!-- 免責聲明 -->
  <p class="disclaimer">
    ⚠️ 本工具僅供參考，無法取代專業醫療診斷。如有嚴重症狀請立即前往急診就醫。
  </p>

</div>

<script>
// ===== AI 分析功能 =====
const GEMINI_MODEL = 'gemini-2.5-flash';

let sessionGeminiKey = localStorage.getItem('symptomChecker_geminiKey') || '';

function getGeminiKey() {
  return sessionGeminiKey;
}

function setGeminiKey(key) {
  sessionGeminiKey = key;
  if (key) {
    localStorage.setItem('symptomChecker_geminiKey', key);
  } else {
    localStorage.removeItem('symptomChecker_geminiKey');
  }
}

function escapeHtml(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
}

function openSymptomSettings() {
  document.getElementById('geminiKeyInput').value = getGeminiKey();
  document.getElementById('settingsModal').style.display = 'flex';
}
function closeSymptomSettings() {
  document.getElementById('settingsModal').style.display = 'none';
}
function saveSymptomSettings() {
  const key = document.getElementById('geminiKeyInput').value.trim();
  setGeminiKey(key || '');
  closeSymptomSettings();
}

let currentAiTab = 'ai';
function switchAiTab(tab) {
  currentAiTab = tab;
  document.getElementById('tabAI').classList.toggle('active', tab === 'ai');
  document.getElementById('tabManual').classList.toggle('active', tab === 'manual');
  document.getElementById('aiPanel').style.display = tab === 'ai' ? 'block' : 'none';
  document.getElementById('manualPanel').style.display = tab === 'manual' ? 'block' : 'none';
  document.getElementById('manualSection').style.display = tab === 'manual' ? 'block' : 'none';
  document.getElementById('symptomCard').style.display = 'none';
  document.getElementById('actionCard').style.display = 'none';
  document.getElementById('resultArea').innerHTML = '';
}

function _symptomCacheKey(text) {
  return 'symptom_ai_' + text.slice(0, 50).replace(/\s+/g, '_');
}

let _aiAnalyzing = false;

async function analyzeWithAI() {
  const text = document.getElementById('aiInput').value.trim();
  const errEl = document.getElementById('aiError');
  const resultEl = document.getElementById('aiResult');
  const btn = document.getElementById('aiBtn');

  if (!text) {
    errEl.textContent = '請先描述你的症狀';
    errEl.style.display = 'block';
    return;
  }
  if (_aiAnalyzing) return;
  errEl.style.display = 'none';

  const apiKey = getGeminiKey();
  if (!apiKey) {
    errEl.innerHTML = '需要 Gemini API Key 才能使用 AI 分析。<a href="#" onclick="openSymptomSettings();return false;" style="color:var(--accent);font-weight:600;">點此設定</a>';
    errEl.style.display = 'block';
    return;
  }

  // 檢查快取（1 小時 TTL）
  const cacheKey = _symptomCacheKey(text);
  const cachedRaw = localStorage.getItem(cacheKey);
  const cachedTime = localStorage.getItem(cacheKey + '_time');
  const now = Date.now();
  if (cachedRaw && cachedTime && now - parseInt(cachedTime) < 3600000) {
    try {
      const cached = JSON.parse(cachedRaw);
      renderAiResult(cached);
      _saveToHistory(text, cached);
      return;
    } catch (_) { /* 快取損壞，繼續呼叫 API */ }
  }

  _aiAnalyzing = true;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>AI 分析中...';
  resultEl.innerHTML = '';

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);

    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: `你是一位台灣的醫療諮詢助手，請根據用戶描述的症狀，推薦合適的就診科別。

用戶描述的症狀：
${text}

請回傳 JSON（不要其他文字）：
{
  "urgencyLevel": "emergency（立即急診）|urgent（盡快就醫）|normal（一般門診）",
  "analysis": "一句話總結症狀描述",
  "departments": [
    {"name": "科別名稱", "rank": 1, "reason": "推薦原因（20字內）"}
  ],
  "redFlags": ["需要立即就醫的警訊，如果有的話"],
  "whatToTell": "就診時建議告訴醫師的重點（症狀時間、程度、誘發因素等）"
}`
            }]
          }],
          generationConfig: { response_mime_type: 'application/json' },
        }),
        signal: controller.signal,
      }
    );
    clearTimeout(timeoutId);

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message ?? `API 錯誤 ${resp.status}`);
    }

    const data = await resp.json();
    if (!data.candidates || data.candidates.length === 0) {
      if (data.promptFeedback?.blockReason) {
        throw new Error(`內容被阻擋：${data.promptFeedback.blockReason}`);
      }
      throw new Error('API 未回傳有效結果');
    }
    const candidate = data.candidates[0];
    if (candidate.finishReason && candidate.finishReason !== 'STOP') {
      throw new Error(`生成被中斷：${candidate.finishReason}`);
    }
    if (!candidate.content || !candidate.content.parts || candidate.content.parts.length === 0 || typeof candidate.content.parts[0].text !== 'string') {
      throw new Error('API 回傳格式異常');
    }
    const raw = candidate.content.parts[0].text.trim();
    const result = JSON.parse(raw);
    // 寫入快取
    localStorage.setItem(cacheKey, JSON.stringify(result));
    localStorage.setItem(cacheKey + '_time', String(now));
    renderAiResult(result);
    _saveToHistory(text, result);
  } catch (e) {
    errEl.innerHTML = `
      <div style="margin-bottom:8px;">⚠️ ${escapeHtml(e.message || 'AI 分析失敗')}</div>
      <div style="font-size:0.8rem;opacity:0.8;">
        你可以改用「📋 點選症狀」模式，或<a href="#" onclick="switchAiTab('manual');return false;" style="color:var(--accent);font-weight:600;">按此切換</a>
      </div>
    `;
    errEl.style.display = 'block';
  } finally {
    _aiAnalyzing = false;
    btn.disabled = false;
    btn.innerHTML = '✨ AI 智能分析';
  }
}

function _saveToHistory(inputText, result) {
  const key = 'symptomChecker_history';
  const history = JSON.parse(localStorage.getItem(key) || '[]');
  history.unshift({
    time: Date.now(),
    input: inputText.slice(0, 100),
    urgencyLevel: result.urgencyLevel || 'normal',
    analysis: result.analysis || '',
    departments: (result.departments || []).slice(0, 3),
  });
  localStorage.setItem(key, JSON.stringify(history.slice(0, 5)));
  renderAiHistory();
}

function renderAiHistory() {
  const container = document.getElementById('aiHistory');
  const history = JSON.parse(localStorage.getItem('symptomChecker_history') || '[]');
  if (history.length === 0) {
    container.innerHTML = '';
    return;
  }
  const levelMap = { emergency: '🚨', urgent: '⚠️', normal: '✅' };
  container.innerHTML = `
    <div style="border-top:1px solid #eee;padding-top:12px;">
      <div style="font-size:0.8rem;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
        <span>📋 最近分析</span>
        <button onclick="_clearHistory()" style="font-size:0.75rem;color:#aaa;background:none;border:none;cursor:pointer;padding:2px 6px;">清空</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${history.map((h, i) => `
          <button onclick="_loadHistory(${i})" style="text-align:left;padding:10px 12px;border:1.5px solid #e8e8e8;border-radius:10px;background:white;cursor:pointer;font-size:0.85rem;transition:all 0.15s;" onmouseenter="this.style.borderColor='var(--accent)'" onmouseleave="this.style.borderColor='#e8e8e8'">
            <span style="font-size:0.75rem;color:#aaa;">${new Date(h.time).toLocaleString('zh-TW',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
            <div style="margin-top:2px;">${levelMap[h.urgencyLevel] || '✅'} ${escapeHtml(h.input)}</div>
            <div style="font-size:0.75rem;color:var(--muted);margin-top:2px;">${h.departments.map(d => d.name).join('、')}</div>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function _loadHistory(index) {
  const history = JSON.parse(localStorage.getItem('symptomChecker_history') || '[]');
  const h = history[index];
  if (!h) return;
  document.getElementById('aiInput').value = h.input;
  renderAiResult({
    urgencyLevel: h.urgencyLevel,
    analysis: h.analysis,
    departments: h.departments,
    redFlags: [],
    whatToTell: '',
  });
  document.getElementById('aiResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function _clearHistory() {
  if (!confirm('確定要清空所有歷史記錄嗎？')) return;
  localStorage.removeItem('symptomChecker_history');
  renderAiHistory();
}

function renderAiResult(r) {
  const level = r.urgencyLevel ?? 'normal';
  const levelMap = {
    emergency: { cls: 'emergency', emoji: '🚨', label: '建議立即前往急診' },
    urgent:    { cls: 'urgent',    emoji: '⚠️', label: '建議盡快就醫（今明日內）' },
    normal:    { cls: 'normal',    emoji: '✅', label: '一般門診即可' },
  };
  const lv = levelMap[level] ?? levelMap.normal;

  const depts = (r.departments ?? []).slice(0, 3).map((d, i) => `
    <div class="dept-item">
      <div class="dept-rank rank-${Math.min(i+1,3)}">${i+1}</div>
      <div>
        <div class="dept-name">${escapeHtml(d.name)}</div>
        <div class="dept-reason">${escapeHtml(d.reason)}</div>
      </div>
    </div>
  `).join('');

  const redFlags = (r.redFlags ?? []).length > 0 ? `
    <div class="tip-box danger" style="margin-top:12px;">
      <strong>🚨 注意警訊：</strong><br>
      ${r.redFlags.map(f => `• ${escapeHtml(f)}`).join('<br>')}
    </div>
  ` : '';

  const el = document.getElementById('aiResult');
  el.innerHTML = `
    <div class="result-card ${lv.cls}" style="margin-top:16px;">
      <div class="result-title">${lv.emoji} ${lv.label}</div>
      <p style="font-size:0.85rem;color:var(--muted);margin-bottom:14px;">AI 解讀：${escapeHtml(r.analysis)}</p>
      <div class="dept-recommendation">${depts}</div>
      ${redFlags}
      ${r.whatToTell ? `<div class="what-to-tell"><strong>💬 就診時告訴醫師：</strong><br>${escapeHtml(r.whatToTell)}</div>` : ''}
      <button onclick="copyAiResult()" style="margin-top:14px;width:100%;padding:10px;border:1.5px solid #ddd;border-radius:12px;background:white;color:#555;font-size:0.85rem;font-weight:600;cursor:pointer;" onmouseenter="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseleave="this.style.borderColor='#ddd';this.style.color='#555'">📋 複製分析結果</button>
    </div>
  `;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  el._aiResultData = r;
}

function copyAiResult() {
  const el = document.getElementById('aiResult');
  const r = el._aiResultData;
  if (!r) return;
  const depts = (r.departments ?? []).slice(0, 3).map((d, i) => `${i+1}. ${d.name}：${d.reason}`).join('\n');
  const flags = (r.redFlags ?? []).length > 0 ? '\n🚨 注意警訊：\n' + r.redFlags.map(f => `• ${f}`).join('\n') : '';
  const tell = r.whatToTell ? `\n💬 就診時告訴醫師：\n${r.whatToTell}` : '';
  const levelMap = { emergency: '🚨 立即前往急診', urgent: '⚠️ 盡快就醫', normal: '✅ 一般門診即可' };
  const text = [
    `【${levelMap[r.urgencyLevel] ?? '✅ 一般門診即可'}】`,
    `AI 解讀：${r.analysis}`,
    '',
    '建議科別：',
    depts,
    flags,
    tell,
    '',
    '（由 醫院掛科篩選器 AI 分析，僅供參考，無法取代專業醫療診斷）'
  ].join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('#aiResult button');
    if (btn) { btn.textContent = '✅ 已複製！'; setTimeout(() => { btn.textContent = '📋 複製分析結果'; }, 2000); }
  }).catch(() => {
    const btn = document.querySelector('#aiResult button');
    if (btn) { btn.textContent = '❌ 複製失敗'; setTimeout(() => { btn.textContent = '📋 複製分析結果'; }, 2000); }
  });
}

// 初始化身體部位
function initBodyParts() {
  const container = document.getElementById('bodyParts');
  Object.entries(SYMPTOM_DB).forEach(([key, data]) => {
    const div = document.createElement('div');
    div.className = 'body-part';
    div.dataset.part = key;
    div.innerHTML = `<span class="emoji">${data.emoji}</span>${data.name}`;
    div.onclick = () => selectPart(key);
    container.appendChild(div);
  });
}

function selectPart(key) {
  selectedPart = key;
  selectedSymptoms = [];

  // 更新部位 UI
  document.querySelectorAll('.body-part').forEach(el => {
    el.classList.toggle('active', el.dataset.part === key);
  });

  // 顯示症狀
  const symptomCard = document.getElementById('symptomCard');
  const symptomList = document.getElementById('symptomList');
  symptomCard.style.display = 'block';

  const symptoms = SYMPTOM_DB[key].symptoms;
  symptomList.innerHTML = symptoms.map((s, i) => `
    <span class="symptom-tag ${s.urgent ? 'urgent' : ''}" data-idx="${i}" onclick="toggleSymptom(${i})">
      ${s.urgent ? '🚨 ' : ''}${s.name}
    </span>
  `).join('');

  // 清除結果
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('actionCard').style.display = 'block';
  saveState();
}

function toggleSymptom(idx) {
  const tags = document.querySelectorAll('.symptom-tag');
  const tag = tags[idx];
  tag.classList.toggle('selected');

  const symptom = SYMPTOM_DB[selectedPart].symptoms[idx];
  const existing = selectedSymptoms.find(s => s.name === symptom.name);
  if (existing) {
    selectedSymptoms = selectedSymptoms.filter(s => s.name !== symptom.name);
  } else {
    selectedSymptoms.push(symptom);
  }
  saveState();
}

function analyze() {
  if (selectedSymptoms.length === 0) {
    document.getElementById('analyzeError').style.display = 'block';
    return;
  }
  document.getElementById('analyzeError').style.display = 'none';

  // 統計科別推薦
  const deptScores = {};
  let hasUrgent = false;

  selectedSymptoms.forEach(s => {
    if (s.urgent) hasUrgent = true;
    s.depts.forEach((dept, i) => {
      if (!deptScores[dept]) deptScores[dept] = { score: 0, reasons: [] };
      // 第一順位分數較高
      deptScores[dept].score += (3 - i) * 10;
      deptScores[dept].reasons.push(`${s.name}：${s.note}`);
    });
  });

  // 排序
  const sortedDepts = Object.entries(deptScores)
    .sort((a, b) => b[1].score - a[1].score)
    .slice(0, 3);

  // 決定緊急程度
  let level = 'normal';
  let title = '🏥 建議就診科別';
  let emoji = '✅';

  // 單一出現即為急診的症狀
  const IMMEDIATE_EMERGENCY = ['胸痛', '呼吸困難', '咳血', '自殺意念', '抽搐/癲癇', '臉部麻木', '過敏反應', '頭部外傷'];
  const urgentSymptoms = selectedSymptoms.filter(s => s.urgent);
  const isImmediate = selectedSymptoms.some(s => IMMEDIATE_EMERGENCY.includes(s.name));

  if (isImmediate || urgentSymptoms.length >= 2) {
    level = 'emergency';
    title = '🚨 強烈建議立即就醫';
    emoji = '🚨';
  } else if (urgentSymptoms.length === 1) {
    level = 'urgent';
    title = '⚠️ 建議盡快就醫';
    emoji = '⚠️';
  }

  // 生成結果 HTML
  const resultArea = document.getElementById('resultArea');

  const selectedHtml = selectedSymptoms.map(s =>
    `<span class="selected-symptom">${s.urgent ? '🚨' : ''} ${s.name}</span>`
  ).join('');

  const deptHtml = sortedDepts.map(([dept, data], i) => `
    <div class="dept-item">
      <div class="dept-rank rank-${i + 1}">${i + 1}</div>
      <div>
        <div class="dept-name">${dept}</div>
        <div class="dept-reason">${data.reasons.join('・')}</div>
      </div>
    </div>
  `).join('');

  // 建議文字
  let tipHtml = '';
  if (level === 'emergency') {
    tipHtml = `
      <div class="tip-box danger">
        <strong>🚨 緊急提醒：</strong>你選擇的症狀包含緊急情況，建議立即前往<strong>急診</strong>就醫，不要拖延。
      </div>`;
  } else if (level === 'urgent') {
    const urgentName = urgentSymptoms[0].name;
    tipHtml = `
      <div class="tip-box warn">
        <strong>⚠️ 注意：</strong>「${urgentName}」建議盡快就醫。如果症狀加劇，請立即前往急診。
      </div>`;
  } else {
    const firstDept = sortedDepts.length ? sortedDepts[0][0] : '家醫科';
    tipHtml = `
      <div class="tip-box info">
        <strong>💡 就醫提醒：</strong>建議先掛<strong>${firstDept}</strong>，醫師會視情況協助轉診其他科別。
      </div>`;
  }

  resultArea.innerHTML = `
    <div class="card result-card ${level}">
      <div class="result-title">${emoji} ${title}</div>
      <p style="color:var(--muted);font-size:0.85rem;margin-bottom:12px;">根據你選擇的症狀：</p>
      <div class="selected-symptoms">${selectedHtml}</div>
      <div class="dept-recommendation">${deptHtml}</div>
      ${tipHtml}
      <div class="divider"></div>
      <p style="font-size:0.8rem;color:#aaa;">
        💬 建議就診時向醫師詳細描述：症狀開始時間、持續多久、什麼情況下加重或緩解、是否有服用藥物。
      </p>
    </div>
  `;

  // 隱藏按鈕區
  document.getElementById('actionCard').style.display = 'none';
  document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetAll() {
  selectedPart = null;
  selectedSymptoms = [];
  localStorage.removeItem('symptomChecker_state');
  document.querySelectorAll('.body-part').forEach(el => el.classList.remove('active'));
  document.getElementById('symptomCard').style.display = 'none';
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('actionCard').style.display = 'none';
  document.getElementById('analyzeError').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function saveState() {
  if (isRestoring) return;
  localStorage.setItem('symptomChecker_state', JSON.stringify({
    selectedPart,
    selectedSymptoms: selectedSymptoms.map(s => s.name)
  }));
}

function loadState() {
  const raw = localStorage.getItem('symptomChecker_state');
  if (!raw) return;
  try {
    const { selectedPart: part, selectedSymptoms: names } = JSON.parse(raw);
    if (part && SYMPTOM_DB[part]) {
      isRestoring = true;
      try {
        selectPart(part);
        names.forEach(name => {
          const idx = SYMPTOM_DB[part].symptoms.findIndex(s => s.name === name);
          if (idx >= 0) toggleSymptom(idx);
        });
      } finally {
        isRestoring = false;
      }
    }
  } catch(e) {}
}

// 初始化
initBodyParts();
loadState();
renderAiHistory();
</script>

</body>
</html>
